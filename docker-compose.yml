version: '3.8'

services:
    php:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: smarthead_php
        working_dir: /var/www
        volumes:
            - ./:/var/www

    nginx:
        image: nginx:alpine
        container_name: smarthead_nginx
        ports:
            - "8000:80"
        volumes:
            - ./:/var/www
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - php

    node:
        image: node:20
        container_name: smarthead_node
        working_dir: /var/www
        ports:
            - "5173:5173"
        volumes:
            - ./:/var/www
            - /var/www/node_modules
        command: sh -c "npm install && npm run dev -- --host --strictPort"
