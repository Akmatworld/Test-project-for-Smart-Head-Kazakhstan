version: '3.8'

services:
    php:
        image: php:8.4-fpm
        container_name: smarthead_php
        working_dir: /var/www
        volumes:
            - ./:/var/www

    nginx:
        image: nginx:alpine
        container_name: smarthead_nginx
        ports:
            - "8000:80"
        volumes:
            - ./:/var/www
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - php

    node:
        image: node:20
        container_name: smarthead_node
        working_dir: /var/www
        ports:
            - "5173:5173"
        volumes:
            - ./:/var/www
        tty: true
